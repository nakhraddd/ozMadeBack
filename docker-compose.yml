version: '3.8'

services:
  app:
    image: ${DOCKERHUB_USERNAME}/ozmadeback:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FIREBASE_CREDENTIALS=/app/firebase_credentials.json
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - REDIS_ADDR=redis:6379
    volumes:
      - ./firebase_credentials.json:/app/firebase_credentials.json
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
