version: '3.8'

services:
  app:
    image: ${DOCKERHUB_USERNAME}/ozmadeback:latest
    ports:
      - "8080:8080"
    # Using env_file is cleaner. Docker will automatically inject everything from
    # the .env file we created in GitHub Actions (DATABASE_URL, GCS_BUCKET_NAME, etc.)
    env_file:
      - .env
    environment:
      # We explicitly set these because they are internal container paths/names
      - FIREBASE_CREDENTIALS=/app/firebase_credentials.json
      - REDIS_ADDR=redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=products
    volumes:
      - ./firebase_credentials.json:/app/firebase_credentials.json
    depends_on:
      - redis
      - elasticsearch
    restart: always
    # FIX 1: Log limits to prevent another 100% disk full crash
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    # FIX 2: Persistent volume so cache doesn't wipe on every deploy
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    restart: always
    # FIX 3: Persistent volume for your products index!
    volumes:
      - es_data:/usr/share/elasticsearch/data
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

# Declare the named volumes at the bottom
volumes:
  redis_data:
  es_data: